---
name: release-please

"on":
  workflow_call:
    secrets:
      token: { required: true }
      supermarket_user: { required: true }
      supermarket_key: { required: true }
      slack_bot_token: { required: true }
      slack_channel_id: { required: true }

jobs:
  release-please:
    runs-on: ubuntu-slim
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.token }}

      - name: Checkout
        uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Upload cookbook as artifact
        if: ${{ steps.release.outputs.release_created }}
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ steps.release.outputs.tag_name }}
          path: |
            .
            !.git/
            !.github/
            !.kitchen/
            !.vscode/
            !documentation/
            !.gitignore
            !test/
            !spec/
          retention-days: 90
          compression-level: 6

      - name: Generate artifact attestation
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ github.event.repository.name }}-${{ steps.release.outputs.tag_name }}
          subject-digest: sha256:${{ steps.upload.outputs.artifact-digest }}

  publish-to-supermarket:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"

      - name: Install cinc
        run: |
          GOBIN="${RUNNER_TEMP}/bin" go install github.com/tas50/cinc-cli/apps/cinc@v0.6.1
          sudo install "${RUNNER_TEMP}/bin/cinc" /usr/local/bin/cinc
          cinc version
        shell: bash

      - name: Configure Cinc credentials
        run: |
          mkdir -p ~/.cinc
          key_path="${HOME}/.cinc/supermarket.pem"
          credentials_path="${HOME}/.cinc/credentials"
          printf '%s\n' "${{ secrets.supermarket_key }}" > "${key_path}"
          chmod 600 "${key_path}"
          {
            echo "[default]"
            echo 'supermarket_site = "https://supermarket.chef.io"'
            printf 'client_name = "%s"\n' "${{ secrets.supermarket_user }}"
            printf 'client_key = "%s"\n' "${key_path}"
          } > "${credentials_path}"
          chmod 600 "${credentials_path}"
        shell: bash

      - name: Validate Supermarket package
        run: |
          cinc supermarket share ${{ github.event.repository.name }} \
            --dry-run \
            --cookbook-path ../ \
            --config ~/.cinc/credentials \
            --format json
        shell: bash

      - name: Publish to Chef Supermarket
        run: |
          cinc supermarket share ${{ github.event.repository.name }} \
            --supermarket-site https://supermarket.chef.io \
            --cookbook-path ../ \
            --config ~/.cinc/credentials
        shell: bash

  notify-slack:
    needs: [release-please, publish-to-supermarket]
    if: ${{ always() && needs.release-please.outputs.release_created && needs.publish-to-supermarket.result == 'success' }}
    runs-on: ubuntu-slim
    steps:
      - name: Post text to a Slack channel
        id: notify-slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.slack_bot_token }}
          errors: true
          payload: |
            channel: ${{ secrets.slack_channel_id }}
            text: "New release of ${{ github.event.repository.name }} cookbook: ${{ needs.release-please.outputs.tag_name }}"
            attachments:
              - color: "#28a745"
                fields:
                  - title: "Status"
                    short: true
                    value: "Completed"

      - name: Convert release body to Slack mrkdwn
        id: format-body
        env:
          BODY: ${{ needs.release-please.outputs.body }}
        run: |
          formatted=$(printf '%s' "$BODY" | sed -E \
            -e 's/^#{1,6}[[:space:]]+(.+)$/*\1*/' \
            -e 's/^#{1,6}[[:space:]]*$//' \
            -e 's/\*\*([^*]+)\*\*/*\1*/g' \
            -e 's/\[([^]]+)\]\(([^)]+)\)/<\2|\1>/g' \
            -e 's/^([[:space:]]*)[*-][[:space:]]+/\1• /')
          {
            echo "body<<SLACK_EOF"
            echo "$formatted"
            echo "SLACK_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Reply to release message with release details
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.slack_bot_token }}
          errors: true
          payload: |
            channel: ${{ secrets.slack_channel_id }}
            thread_ts: "${{ steps.notify-slack.outputs.ts }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ${{ toJSON(steps.format-body.outputs.body) }}
